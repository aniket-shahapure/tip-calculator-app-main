<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Tip calculator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

                <!-- Head-Img -->

   <div class="spli">
      <img src="/tip-calculator-app-main/images/logo.svg" rel="spli tter"/>
    </div>
            
  <main>
    <article>

              <!-- Bill With Amount Box  -->

      <div class="go">
        <div class="main">
         <p class="para">Bill</p>
         <div class="box">
           <div>
            <img src="/tip-calculator-app-main/images/icon-dollar.svg" rel=""/>
           </div>
           <input type="numbar" placeholder="Enter Bill Amount" id="bill" oninput="calculet()">
         </div>

               <!-- Select Tip With Persentes Button -->

       <div>
         <p class="para">Select Tip %</p>
          <div class="persent">
           <div onclick="tip(5)">5%</div>
           <div onclick="tip(10)">10%</div>
           <div onclick="tip(15)">15%</div>
           <div onclick="tip(25)">25%</div>
           <div onclick="tip(50)">50%</div>
           <input type="number" id="customTip" placeholder="Custom " oninput="setCustomTip()">
         </div> 
       </div>

               <!-- Number of People With Box -->

       <div>
         <p class="para">Number of People</p>
         <div class="box">
           <img src="/tip-calculator-app-main/images/icon-person.svg" alt="person"/>
           <input type="number" placeholder="Enter Number of People" id="people" oninput="calculet()">
         </div>
       </div>
      </div>

                <!--Tip Amount & Total Person Box Footer  -->

      <div class="so">
        <footer>
         <div class="tip" >
           <div class="total-para">
            <p class="tip-para">Tip Amount</p>
            <p class="person">/ person</p>
           </div>
           <div>
            <img src="" alt=""/>
            <p class="total" id="tipPerPerson"><span>$</span>0</p>
           </div>
         </div>
         <div class="tip">
          <div class="total-para">
            <p class="tip-para">Total</p>
            <p class="person">/ person</p>
          </div>
          <div>
            <img src="" alt=""/>
            <p class="total" id="totalPerPerson"><span>$</span>0</p>
          </div>
         </div>

                    <!-- Reset Button -->

          <button onclick="resetCalculator()">RESET</button>
       </footer>
      </div>
    </artical>   
  </main>

  


  <script src="practice.js"></script>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>

</body>
</html>
